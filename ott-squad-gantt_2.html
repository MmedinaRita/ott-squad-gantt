<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTT Squad — Gantt Sprint 15-26 Jun 2026</title>
<style>
:root{--bg:#0F0F13;--surface:#1A1A22;--surface2:#22222E;--border:#2A2A3A;--border2:#38384E;--text:#E8E8F0;--text2:#8888A8;--text3:#44445A;--accent:#6B5FFF;--today:#FF6B6B}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;font-size:13px;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px}
.logo-m{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#6B5FFF,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.logo-t{font-size:13px;font-weight:600}.logo-s{font-size:10px;color:var(--text2);margin-top:1px}
.badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;background:#3ECF8E}
.tb{display:flex;align-items:center;gap:10px;padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;min-height:44px}
.tb-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.lbl{font-size:10px;color:var(--text2);font-weight:500;white-space:nowrap}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.search{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;padding:4px 9px;min-width:160px}
.search input{border:none;background:transparent;color:var(--text);font-size:11px;outline:none;width:100%}
.search input::placeholder{color:var(--text3)}
.zoom{display:flex;align-items:center;gap:3px}
.zbtn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.zbtn:hover{border-color:var(--accent);color:var(--accent)}
.stats{display:flex;background:var(--bg);border-bottom:1px solid var(--border)}
.stat{flex:1;padding:8px 16px;background:var(--surface);border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.sv{font-size:18px;font-weight:700}.sl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.gantt-wrap{display:flex;height:calc(100vh - 61px - 44px - 42px - 32px);overflow:hidden}
.gl{width:200px;flex-shrink:0;overflow-y:auto;overflow-x:hidden;border-right:1px solid var(--border);background:var(--surface);scrollbar-width:thin}
.gr{flex:1;overflow:auto;scrollbar-width:thin}
.phdr{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--surface2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2}
.av{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff}
.pn{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc{font-size:9px;color:var(--text2)}
.erow{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 40px;border-bottom:1px solid var(--border);font-size:9px;color:var(--text2);min-height:22px}
.edot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.trow{padding:3px 10px 3px 40px;border-bottom:1px solid var(--border);font-size:9px;color:var(--text3);min-height:20px;display:flex;align-items:center;line-height:1.3;overflow:hidden}
.day-hdr{display:flex;position:sticky;top:0;z-index:10;background:var(--surface2);border-bottom:1px solid var(--border)}
.day{flex-shrink:0;text-align:center;padding:4px 0;border-right:1px solid var(--border);font-size:9px;color:var(--text2);line-height:1.4}
.day.tod{color:var(--today);font-weight:700}.day.wknd{opacity:.4}
.bc{position:relative}
.pr{border-bottom:1px solid var(--border);position:relative}
.phdrr{border-bottom:1px solid var(--border);background:var(--surface2)}
.err{border-bottom:1px solid var(--border);background:var(--surface);height:22px;position:relative}
.trr{border-bottom:1px solid var(--border);height:20px;position:relative}
.dl{position:absolute;top:0;bottom:0;width:1px;background:var(--border);opacity:.4;pointer-events:none}
.dl.tod{background:var(--today);opacity:.9;width:2px}.dl.wknd{opacity:.15}
.bar{position:absolute;height:14px;top:3px;border-radius:3px;display:flex;align-items:center;padding:0 5px;font-size:8px;font-weight:600;white-space:nowrap;overflow:hidden;cursor:pointer;transition:opacity .1s,transform .1s;z-index:2}
.bar:hover{opacity:.8;z-index:10}
.s-done{background:#1E4D3A;color:#6FCF97}
.s-prog{background:#1B3A5C;color:#7EC8E3}
.s-cr{background:#2D2060;color:#B39DDB}
.s-qa{background:#4D3000;color:#FFD166}
.s-stuck{background:#4D1010;color:#FF6B6B}
.s-pf{background:#4D2800;color:#FFB347}
.s-todo{background:#242435;color:#6666A0}
.s-pause{background:#2A2A3A;color:#8888A8}
.s-cra{background:#1A3A2A;color:#80CBC4}
.leg{display:flex;align-items:center;gap:12px;padding:6px 20px;background:var(--surface);border-top:1px solid var(--border);flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)}
.ls{width:9px;height:9px;border-radius:2px}
.tt{position:fixed;z-index:999;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;max-width:260px;pointer-events:none;opacity:0;transition:opacity .08s;font-size:11px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.tt.show{opacity:1}
.tt-title{font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4}
.tt-meta{color:var(--text2);font-size:10px}
.tt-st{display:inline-block;margin-top:5px;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:6px;color:var(--text2);font-size:12px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<header class="hdr">
  <div class="logo">
    <div class="logo-m">OT</div>
    <div><div class="logo-t">OTT Squad Planner</div><div class="logo-s">Sprint 15–26 Jun 2026 · Next Planning</div></div>
  </div>
  <div class="badge"><div class="dot"></div><span>Datos actualizados · Jun 24, 2026</span></div>
</header>
<div class="tb" id="tb">
  <span class="lbl">Personas:</span><div class="chips" id="pchips"></div>
  <div class="tb-sep"></div>
  <span class="lbl">Estado:</span><div class="chips" id="schips"></div>
  <div class="tb-sep"></div>
  <div class="search"><span style="color:var(--text3);font-size:11px">⌕</span><input type="text" placeholder="Buscar tarea..." id="q" oninput="render()"></div>
  <div class="tb-sep"></div>
  <div class="zoom">
    <button class="zbtn" onclick="zoom(-8)">−</button>
    <span style="font-size:10px;color:var(--text2);min-width:28px;text-align:center" id="zlbl">100%</span>
    <button class="zbtn" onclick="zoom(8)">+</button>
  </div>
</div>
<div class="stats" id="stats"></div>
<div class="gantt-wrap"><div class="gl" id="gl"></div><div class="gr" id="gr" onscroll="sync()"></div></div>
<div class="leg">
  <div class="li"><div class="ls s-done"></div>Done</div>
  <div class="li"><div class="ls s-prog"></div>In Progress</div>
  <div class="li"><div class="ls s-cr"></div>Code Review</div>
  <div class="li"><div class="ls s-cra"></div>CR Approved</div>
  <div class="li"><div class="ls s-qa"></div>QA</div>
  <div class="li"><div class="ls s-stuck"></div>Stuck</div>
  <div class="li"><div class="ls s-pf"></div>Pending Feedback</div>
  <div class="li"><div class="ls s-pause"></div>Pause</div>
  <div class="li"><div class="ls s-todo"></div>To Do</div>
  <div class="li" style="margin-left:auto"><div style="width:2px;height:9px;background:var(--today);border-radius:1px"></div><span>Hoy</span></div>
</div>
<div class="tt" id="tt"></div>
<script>
const ITEMS=[
  {id:'12185052933',name:'Keep watching Microdramas - no redirige al formato vertical',persons:['Patrick Stange'],status:'QA',env:'Web',fecha:'2026-06-23 - 2026-06-23'},
  {id:'12272900412',name:'TVN Media Panamá - Funcionalidad faltante en EPG',persons:['Bryan Gama'],status:'Done',env:'Backend',fecha:'2026-06-15 - 2026-06-16'},
  {id:'12340179798',name:'Manager - Agregar campo de URL de Tracking (Pixel)',persons:['Daniel Lagos'],status:'Done',env:'Manager',fecha:'2026-06-22 - 2026-06-23'},
  {id:'12294742258',name:'Android TV Aragón Play - bundle ID compartir con mobile',persons:['Bryan Gama'],status:'Done',env:'Android TV',fecha:'2026-06-16 - 2026-06-19'},
  {id:'12295876734',name:'RCN RADIO - Hero Radio Collections no muestra 3er schedule',persons:['Patrick Stange'],status:'Pause',env:'Web',fecha:'2026-06-19 - 2026-06-22'},
  {id:'12297536576',name:'TV AZTECA - Barra de Navegación se sobrepone en Interactions',persons:['Juan José Carmona'],status:'Code-Review',env:'Android',fecha:'2026-06-18 - 2026-06-19'},
  {id:'12323148499',name:'Aragón Play Web - Espacio enorme entre componentes',persons:['Sthephany Granados'],status:'Done',env:'Web',fecha:'2026-06-19 - 2026-06-19'},
  {id:'12323200606',name:'Aragón Play Web - Botón Volver arriba roto',persons:['Sthephany Granados'],status:'Done',env:'Web',fecha:'2026-06-19 - 2026-06-19'},
  {id:'12322608239',name:'CARTV - Subcategorías en navegación Programas radio',persons:['Alejo Jil'],status:'Done',env:'Web',fecha:'2026-06-19 - 2026-06-20'},
  {id:'12331448533',name:'CARTV - Imágenes Tournament de Fútbol Sala no se guardan',persons:['Sthephany Granados'],status:'Code-Review',env:'Web',fecha:'2026-06-22 - 2026-06-24'},
  {id:'12336506988',name:'CARTV - Canal fast no aparece en player web full screen',persons:['Patrick Stange'],status:'Done',env:'Web',fecha:'2026-06-22 - 2026-06-23'},
  {id:'12307008815',name:'Ondamedia - Hero Slider no se visualiza con sesión iniciada',persons:['Patrick Stange'],status:'Done',env:'Web',fecha:'2026-06-23 - 2026-06-23'},
  {id:'12347596040',name:'URGENTE - Incidencias Didomi y GTM en Web (Aragón TV)',persons:['Patrick Stange','Alejo Jil'],status:'Done',env:'Web',fecha:'2026-06-23 - 2026-06-24'},
  {id:'12349492679',name:'Fire TV - Bug prerolls: espacios en parámetro custom.an',persons:['Andrés Guevara'],status:'In Progress',env:'Fire TV',fecha:'2026-06-24 - 2026-06-25'},
  {id:'12301943279',name:'Mobile - Badge Appearance: badges de tiempo',persons:['Esteban Gomez'],status:'Done',env:'Mobile',fecha:'2026-06-17 - 2026-06-17'},
  {id:'12303079427',name:'BUG - Latencia excesiva en Live (Roku y Web)',persons:['Bryan Gama'],status:'Done',env:'Roku',fecha:'2026-06-17 - 2026-06-18'},
  {id:'12284404699',name:'Fire TV - Teclado parpadea y desaparece en Login',persons:['Sebastián Navarro'],status:'Done',env:'Fire TV',fecha:'2026-06-18 - 2026-06-22'},
  {id:'12340448803',name:'Android TV AOD - Contenidos de audio no reproducen',persons:['Sebastián Navarro'],status:'Code-Review',env:'Android TV',fecha:'2026-06-22 - 2026-06-24'},
  {id:'12340676511',name:'Android TV Aragón - Content Rating mal posicionado',persons:['Sebastián Navarro'],status:'Code-Review',env:'Android TV',fecha:'2026-06-22 - 2026-06-24'},
  {id:'12340690684',name:'Android TV Aragón - Miniaturas no cargan en Favoritos',persons:['Sebastián Navarro'],status:'CR-Approved',env:'Android TV',fecha:'2026-06-22 - 2026-06-24'},
  {id:'12340468901',name:'Android TV - Demora excesiva al cambiar de episodio',persons:['Sebastián Navarro'],status:'CR-Approved',env:'Android TV',fecha:'2026-06-22 - 2026-06-24'},
  {id:'12340399819',name:'Android TV Aragón - Modo Preview se activa con flecha izq',persons:['Sebastián Navarro'],status:'CR-Approved',env:'Android TV',fecha:'2026-06-22 - 2026-06-24'},
  {id:'12351882877',name:'BUG Mobile - Error de carga infinito en contenidos AOD',persons:['Juan José Carmona'],status:'Pending Feedback',env:'Mobile',fecha:'2026-06-23 - 2026-06-24'},
  {id:'12350292334',name:'CARTV - Color de Avatar no toma los colores de Accent Color',persons:['Patrick Stange'],status:'Code-Review',env:'Web',fecha:'2026-06-23 - 2026-06-24'},
  {id:'12319647146',name:'Caracol - Texto Perfiles en administrar (próx sprint)',persons:['Sthephany Granados'],status:'QA',env:'Web',fecha:'2026-06-24 - 2026-06-24'},
  {id:'12079508872',name:'América TV - Vulnerabilidades Ethical Hacking APP BZN',persons:['Juan José Carmona'],status:'Pending Feedback',env:'Android',fecha:'2026-06-15 - 2026-06-24'},
  {id:'12142955867',name:'iOS - Botón Siguiente Episodio se muestra en inglés',persons:['Juan José Carmona'],status:'In Progress',env:'iOS',fecha:'2026-06-15 - 2026-06-24'},
];
const TEAM=['Patrick Stange','Sthephany Granados','Juan José Carmona','René Arias','Daniel Lagos','Alejo Jil','Sebastián Navarro','Andrés Guevara','Bryan Gama','Leonardo Loyo','Esteban Gomez'];
const PC=['#6B5FFF','#FF6B9D','#FFB347','#4ECDC4','#45B7D1','#96CEB4','#FF8C94','#A8E6CF','#FFD93D','#C77DFF','#74B9FF'];
const pcm={};let ci=0;
function pColor(p){if(!pcm[p]){pcm[p]=PC[ci%PC.length];ci++;}return pcm[p];}
TEAM.forEach(p=>pColor(p));
const DN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
function mkDays(s,e){const d=[],sd=new Date(s+'T00:00:00'),ed=new Date(e+'T00:00:00');for(let x=new Date(sd);x<=ed;x.setDate(x.getDate()+1))d.push(new Date(x));return d;}
const DAYS=mkDays('2026-06-15','2026-06-26'),N=DAYS.length;
const TODAY='2026-06-24',TODAYI=DAYS.findIndex(d=>d.toISOString().slice(0,10)===TODAY);
let dayW=60,apF=new Set(),asF=new Set();
function sc(s){const l=(s||'').toLowerCase();if(l.includes('done'))return's-done';if(l.includes('cr-approved'))return's-cra';if(l.includes('progress'))return's-prog';if(l.includes('code-review'))return's-cr';if(l.includes('qa'))return's-qa';if(l.includes('stuck'))return's-stuck';if(l.includes('pending'))return's-pf';if(l.includes('pause'))return's-pause';return's-todo';}
function getBar(f){if(!f)return{si:0,ei:N-1};const p=f.split(' - ');const ti=d=>{const t=new Date(d+'T00:00:00');return DAYS.findIndex(x=>x.getTime()===t.getTime());};let si=ti(p[0]);if(si<0)si=0;let ei=p[1]?ti(p[1]):si;if(ei<0)ei=N-1;return{si:Math.max(0,si),ei:Math.min(N-1,Math.max(si,ei))};}
function ini(n){const p=n.split(' ');return(p[0][0]+(p[1]?.[0]||'')).toUpperCase();}
function eCol(e){const l=(e||'').toLowerCase();if(l.includes('web')||l.includes('manager'))return'#185FA5';if(l.includes('mobile')||l.includes('ios'))return'#27500A';if(l.includes('android')&&!l.includes('tv'))return'#2E7D32';if(l.includes('tv')||l.includes('roku')||l.includes('fire'))return'#6B3FA0';if(l.includes('backend'))return'#854F0B';return'#444';}
function buildChips(){
  const people=[...new Set(ITEMS.flatMap(i=>i.persons))].sort((a,b)=>{const ia=TEAM.indexOf(a),ib=TEAM.indexOf(b);return ia<0&&ib<0?a.localeCompare(b):ia<0?1:ib<0?-1:ia-ib;});
  const statuses=[...new Set(ITEMS.map(i=>i.status))].sort();
  const pc=document.getElementById('pchips'),sc2=document.getElementById('schips');
  pc.innerHTML='';sc2.innerHTML='';
  const a1=document.createElement('button');a1.className='chip'+(apF.size===0?' on':'');a1.textContent='Todos';a1.onclick=()=>{apF.clear();render();};pc.appendChild(a1);
  people.forEach(p=>{const c=document.createElement('button');const col=pColor(p);c.className='chip'+(apF.has(p)?' on':'');c.textContent=p.split(' ')[0];c.title=p;c.style.borderColor=col;if(apF.has(p)){c.style.background=col;c.style.color='#fff';}c.onclick=()=>{apF.has(p)?apF.delete(p):apF.add(p);render();};pc.appendChild(c);});
  const a2=document.createElement('button');a2.className='chip'+(asF.size===0?' on':'');a2.textContent='Todos';a2.onclick=()=>{asF.clear();render();};sc2.appendChild(a2);
  statuses.forEach(s=>{const c=document.createElement('button');c.className='chip'+(asF.has(s)?' on':'');c.textContent=s;c.onclick=()=>{asF.has(s)?asF.delete(s):asF.add(s);render();};sc2.appendChild(c);});
}
function render(){
  buildChips();
  const q=(document.getElementById('q')?.value||'').toLowerCase();
  let items=ITEMS.filter(i=>{
    if(q&&!i.name.toLowerCase().includes(q)&&!i.persons.join().toLowerCase().includes(q))return false;
    if(apF.size>0&&!i.persons.some(p=>apF.has(p)))return false;
    if(asF.size>0&&!asF.has(i.status))return false;
    return true;
  });
  const total=items.length,done=items.filter(i=>i.status==='Done').length,prog=items.filter(i=>i.status==='In Progress').length,stuck=items.filter(i=>i.status==='Stuck').length,pct=total?Math.round(done/total*100):0;
  document.getElementById('stats').innerHTML=`<div class="stat"><div class="sv">${total}</div><div class="sl">Tareas</div></div><div class="stat"><div class="sv" style="color:#6FCF97">${done}</div><div class="sl">Done</div></div><div class="stat"><div class="sv" style="color:#7EC8E3">${prog}</div><div class="sl">En progreso</div></div><div class="stat"><div class="sv" style="color:#FF6B6B">${stuck}</div><div class="sl">Stuck</div></div><div class="stat"><div class="sv" style="color:#B39DDB">${[...new Set(items.flatMap(i=>i.persons))].length}</div><div class="sl">Personas</div></div><div class="stat"><div class="sv">${pct}%</div><div class="sl">Completado</div></div>`;
  const pmap={};
  items.forEach(item=>{item.persons.forEach(p=>{if(!pmap[p])pmap[p]={};const e=item.env.split('/')[0].trim();if(!pmap[p][e])pmap[p][e]=[];pmap[p][e].push(item);});});
  const people=Object.keys(pmap).sort((a,b)=>{const ia=TEAM.indexOf(a),ib=TEAM.indexOf(b);return ia<0&&ib<0?a.localeCompare(b):ia<0?1:ib<0?-1:ia-ib;});
  const TW=N*dayW;
  function dls(h){let s='';DAYS.forEach((_,i)=>{const iT=i===TODAYI,iW=DAYS[i].getDay()===0||DAYS[i].getDay()===6;s+=`<div class="dl${iT?' tod':iW?' wknd':''}" style="left:${i*dayW}px;height:${h}px"></div>`;});return s;}
  let lh='';
  people.forEach(p=>{const envs=pmap[p];const tc=Object.values(envs).flat().length;const col=pColor(p);lh+=`<div><div class="phdr"><div class="av" style="background:${col}">${ini(p)}</div><div><div class="pn">${p.split(' ')[0]} ${p.split(' ')[1]||''}</div><div class="pc">${tc} tarea${tc!==1?'s':''}</div></div></div>`;Object.entries(envs).forEach(([e,ts])=>{lh+=`<div class="erow"><div class="edot" style="background:${eCol(e)}"></div>${e} <span style="margin-left:auto">${ts.length}</span></div>`;ts.forEach(t=>{lh+=`<div class="trow" title="${t.name}">${t.name.length>27?t.name.slice(0,26)+'…':t.name}</div>`;});});lh+=`</div>`;});
  document.getElementById('gl').innerHTML=lh||'<div class="empty"><div style="font-size:24px">🔍</div>Sin resultados</div>';
  let rh=`<div class="day-hdr" style="width:${TW}px">`;
  DAYS.forEach((d,i)=>{const iT=i===TODAYI,iW=d.getDay()===0||d.getDay()===6;rh+=`<div class="day${iT?' tod':iW?' wknd':''}" style="width:${dayW}px">${DN[d.getDay()]}<br><strong>${d.getDate()}</strong></div>`;});
  rh+=`</div><div class="bc" style="width:${TW}px">`;
  people.forEach(p=>{const envs=pmap[p];rh+=`<div class="pr"><div class="phdrr" style="height:42px;width:${TW}px">${dls(42)}</div>`;Object.entries(envs).forEach(([e,ts])=>{rh+=`<div class="err" style="width:${TW}px">${dls(22)}</div>`;ts.forEach(t=>{const{si,ei}=getBar(t.fecha);const left=si*dayW,width=Math.max(dayW*.7,(ei-si+1)*dayW-2);const cls=sc(t.status);const es=s=>s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');rh+=`<div class="trr" style="width:${TW}px">${dls(20)}<div class="bar ${cls}" style="left:${left}px;width:${width}px" data-n="${es(t.name)}" data-p="${es(t.persons.join(', '))}" data-s="${t.status}" data-e="${t.env}" data-f="${t.fecha||'Sin fecha'}" onmouseenter="tip(event,this)" onmouseleave="untip()" onclick="window.open('https://mediastream.monday.com/boards/392795928/pulses/${t.id}','_blank')">${t.name.slice(0,Math.max(4,Math.floor(width/6)))}</div></div>`;});});rh+=`</div>`;});
  rh+=`</div>`;
  document.getElementById('gr').innerHTML=rh;
}
function tip(e,el){const t=document.getElementById('tt');t.innerHTML=`<div class="tt-title">${el.dataset.n}</div><div class="tt-meta">👤 ${el.dataset.p}<br>🖥 ${el.dataset.e}<br>📅 ${el.dataset.f}</div><span class="tt-st ${sc(el.dataset.s)}">${el.dataset.s}</span>`;t.style.left=Math.min(e.clientX+12,window.innerWidth-280)+'px';t.style.top=Math.min(e.clientY+12,window.innerHeight-140)+'px';t.classList.add('show');}
function untip(){document.getElementById('tt').classList.remove('show');}
function zoom(d){dayW=Math.max(30,Math.min(160,dayW+d));document.getElementById('zlbl').textContent=Math.round(dayW/60*100)+'%';render();}
function sync(){document.getElementById('gl').scrollTop=document.getElementById('gr').scrollTop;}
render();
</script>
</body>
